_target_: triforces.models.adapter_model.AdapterModel
backbone:
  _target_: triforces.models.triforces.TriForcesModel
  interaction:
    _target_: triforces.models.triforces_struct.TriForcesStructBackbone
    embed_dim: 512
    num_layers: 4
    r_max: 6.0
    num_rbf: 64
    max_neighbors: 120
    max_atomic_number: ${max_atomic_number}
  interaction_dim: ${.interaction.embed_dim}
  interaction_name: orb
  composition_dim: ${embed_dim}
  structural_dim: ${embed_dim}
  cutoff: ${.interaction.r_max}
  max_neighbors: ${.interaction.max_neighbors}
  num_elements: ${max_atomic_number}
  fusion_mode: add
heads:
  barlow:
    _target_: triforces.models.heads.BarlowTwinsProjectionHead
    input_dim: ${embed_dim}
    projection_dim: ${projection_dim}
    compute_node_level: true
    compute_graph_level: true
    reduce: mean
